<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TextBeeOTP - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    input[type="email"],
    input[type="tel"],
    select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: inherit;
    }

    input[type="email"]:focus,
    input[type="tel"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .channel-selector {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .channel-option {
      flex: 1;
    }

    .channel-option input[type="radio"] {
      display: none;
    }

    .channel-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 0;
      font-weight: 500;
      color: #666;
    }

    .channel-option input[type="radio"]:checked + label {
      border-color: #667eea;
      background-color: rgba(102, 126, 234, 0.1);
      color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      display: none;
      background-color: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      border-left: 4px solid #c33;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #666;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ddd;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .helper-text {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .method-selector {
      text-align: center;
    }

    .method-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 24px;
    }

    .methods {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .method-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: white;
      border: 2px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
      justify-content: flex-start;
      text-align: left;
    }

    .method-btn:hover {
      border-color: #667eea;
      background-color: rgba(102, 126, 234, 0.05);
    }

    .method-btn:active {
      transform: scale(0.98);
    }

    .method-btn .method-icon {
      font-size: 20px;
      min-width: 20px;
    }

    .method-btn .method-name {
      font-weight: 500;
      color: #333;
      font-size: 14px;
    }

    .method-btn .method-desc {
      font-size: 12px;
      color: #999;
      display: block;
    }

    .method-otp {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);
      border-color: #667eea;
    }

    .method-otp:hover {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
    }

    .method-social {
      border-color: #ddd;
      flex-direction: row;
    }

    .method-social .method-desc {
      display: none;
    }

    .divider {
      color: #ccc;
      font-size: 12px;
      font-weight: 500;
      margin: 8px 0;
      text-transform: uppercase;
    }

    .form-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
    }

    .back-btn {
      background: none;
      border: none;
      color: #667eea;
      cursor: pointer;
      padding: 0;
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-btn:hover {
      text-decoration: underline;
    }

    .form-title {
      flex: 1;
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">TextBeeOTP</div>
      <div class="subtitle">One-Time Password Authentication</div>
    </div>

    <div id="methodSelector" class="method-selector">
      <div class="method-title">Choose Your Authentication Method</div>
      
      <div class="methods">
        <button type="button" class="method-btn method-otp" id="otpBtn">
          <span class="method-icon">📧</span>
          <span class="method-name">Email or Phone</span>
          <span class="method-desc">Verify with an OTP code</span>
        </button>
        
        <div class="divider">OR</div>
        
        <button type="button" class="method-btn method-social google" id="googleBtn">
          <span class="method-icon">🔴</span>
          <span class="method-name">Continue with Google</span>
        </button>
        
        <button type="button" class="method-btn method-social facebook" id="facebookBtn">
          <span class="method-icon">🔵</span>
          <span class="method-name">Continue with Facebook</span>
        </button>
      </div>
    </div>

    <form id="loginForm" style="display: none;">
      <div class="form-header">
        <button type="button" class="back-btn" id="backBtn">← Back</button>
        <span class="form-title">Email or Phone Verification</span>
      </div>
      <div class="error-message" id="errorMessage"></div>

      <div class="form-group">
        <label>How would you like to receive your code?</label>
        <div class="channel-selector">
          <div class="channel-option">
            <input type="radio" id="emailChannel" name="channel" value="email" checked>
            <label for="emailChannel">📧 Email</label>
          </div>
          <div class="channel-option">
            <input type="radio" id="smsChannel" name="channel" value="sms">
            <label for="smsChannel">📱 SMS</label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="recipient" id="recipientLabel">Email Address</label>
        <input
          type="email"
          id="recipient"
          name="recipient"
          placeholder="your@email.com"
          required
        >
        <div class="helper-text" id="helperText">We'll send a 6-digit code to this email</div>
      </div>

      <button type="submit" id="submitBtn">
        Send Code
      </button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        Sending code...
      </div>
    </form>
  </div>

  <script src="/views/login.js"></script>
</body>
</html>
